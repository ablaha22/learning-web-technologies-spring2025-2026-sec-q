<!DOCTYPE html>
<html>
<head>
    <title>Lab 2.2 - HTML Form</title>
</head>

<body>

<h2>1. Name</h2>
<form>
    <input type="text" name="name">
    <br><br>
    <input type="submit" value="Submit">
</form>

<hr>

<h2>2. Email</h2>
<form>
    <input type="email" name="email" placeholder="sample@example.com">
    <br><br>
    <input type="submit" value="Submit">
</form>

<hr>

<h2>3. Gender</h2>
<form>
    <fieldset>
        <legend>Gender</legend>

        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other

    </fieldset>

    <br>
    <input type="submit" value="Submit">
</form>

<hr>

<h2>4. Date of Birth</h2>
<form>
    <fieldset>
        <legend>Date of Birth</legend>

        dd &nbsp;&nbsp; mm &nbsp;&nbsp; yyyy <br><br>

        <input type="text" size="2"> /
        <input type="text" size="2"> /
        <input type="text" size="4">

    </fieldset>

    <br>
    <input type="submit" value="Submit">
</form>

<hr>

<h2>5. Degree</h2>
<form>
    <fieldset>
        <legend>Degree</legend>

        <input type="checkbox"> SSC
        <input type="checkbox"> HSC
        <input type="checkbox"> BSc

    </fieldset>

    <br>
    <input type="submit" value="Submit">
</form>

<hr>

<h2>6. Blood Group</h2>
<form>
    Blood Group
    <select>
        <option>A+</option>
        <option>A-</option>
        <option>B+</option>
        <option>B-</option>
        <option>O+</option>
        <option>O-</option>
    </select>

    <br><br>
    <input type="submit" value="Submit">
</form>

<hr>

<h2>7. Profile Picture</h2>
<form>
    <fieldset>
        <legend>Profile Picture</legend>

        User Id <br>
        <input type="text" name="userid">

        <br><br>

        Picture <br>
        <input type="file" name="picture">

    </fieldset>

    <br>
    <input type="submit" value="Submit">
</form>

</body>
</html>
