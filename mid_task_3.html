<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .cell {
            width: 80px;
            height: 80px;
            background: #eee;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .win {
            background: green;
            color: white;
        }

        button {
            margin-top: 15px;
            padding: 8px 15px;
        }
    </style>
</head>

<body>

    <h1>Tic Tac Toe</h1>

    <p id="status">Player X Turn</p>

    <div id="board"></div>

    <button id="resetBtn">Reset</button>

    <p>X Score: <span id="xScore">0</span> | O Score: <span id="oScore">0</span></p>

    <script>
        let board = document.getElementById('board');
        let statusText = document.getElementById('status');

        let currentPlayer = "X";
        let gameActive = true;
        let gameState = ["", "", "", "", "", "", "", "", ""];

        let xScore = 0;
        let oScore = 0;

        let winPatterns = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];

        
        function createBoard() {
            board.innerHTML = "";

            for (let i = 0; i < 9; i++) {
                let cell = document.createElement('div');
                cell.classList.add('cell');
                cell.setAttribute('data-index', i);

                cell.addEventListener('click', cellClick);

                board.appendChild(cell);
            }
        }

        
        function cellClick() {
            let index = this.getAttribute('data-index');

            if (gameState[index] !== "" || !gameActive) {
                return;
            }

            this.innerHTML = currentPlayer;
            gameState[index] = currentPlayer;

            checkWinner();
        }

        
        function checkWinner() {
            let win = false;

            for (let i = 0; i < winPatterns.length; i++) {
                let a = winPatterns[i][0];
                let b = winPatterns[i][1];
                let c = winPatterns[i][2];

                if (
                    gameState[a] !== "" &&
                    gameState[a] === gameState[b] &&
                    gameState[a] === gameState[c]
                ) {
                    win = true;

                    let cells = document.getElementsByClassName('cell');
                    cells[a].classList.add('win');
                    cells[b].classList.add('win');
                    cells[c].classList.add('win');

                    break;
                }
            }

            if (win) {
                statusText.innerHTML = "Player " + currentPlayer + " Wins!";
                gameActive = false;

                if (currentPlayer === "X") {
                    xScore++;
                    document.getElementById('xScore').innerHTML = xScore;
                } else {
                    oScore++;
                    document.getElementById('oScore').innerHTML = oScore;
                }

                return;
            }

            
            if (!gameState.includes("")) {
                statusText.innerHTML = "It's a Draw!";
                gameActive = false;
                return;
            }

            
            if (currentPlayer === "X") {
                currentPlayer = "O";
            } else {
                currentPlayer = "X";
            }

            statusText.innerHTML = "Player " + currentPlayer + " Turn";
        }

        
        function resetGame() {
            gameState = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;

            statusText.innerHTML = "Player X Turn";

            createBoard();
        }

        
        let resetBtn = document.getElementById('resetBtn');
        resetBtn.addEventListener('click', resetGame);

        
        createBoard();
    </script>

</body>
</html>
