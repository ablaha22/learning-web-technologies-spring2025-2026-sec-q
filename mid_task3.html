<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Practice</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #box {
            width: 100px;
            height: 100px;
            background-color: blue;
            position: relative;
            top: 0px;
            border-radius: 10px;
            margin: 20px auto;
        }
    </style>
</head>

<body>

    <h1 id="title">Welcome</h1>

    <input type="text" id="nameInput" placeholder="Enter your name">
    <br><br>

    <input type="button" id="showBtn" value="Show Name">
    <input type="button" id="moveBtn" value="Move Down">

    <p id="output"></p>

    <div id="box"></div>

    <script>
        // Function for showing name
        function showName() {
            let title = document.getElementById('title');
            let input = document.getElementById('nameInput');
            let output = document.getElementById('output');

            if (input.value === "") {
                output.innerHTML = "Please enter your name!";
                title.innerHTML = "Welcome";
            } else {
                title.innerHTML = "Hello " + input.value;
                output.innerHTML = "";
            }
        }

        // Button click event
        let showBtn = document.getElementById('showBtn');
        showBtn.addEventListener('click', showName);


        // Animation button
        let moveBtn = document.getElementById('moveBtn');

        moveBtn.addEventListener('click', function () {
            let box = document.getElementById('box');
            let currentTop = window.getComputedStyle(box).top;

            let count = 1;

            let interval = setInterval(() => {
                if (count > 8) {
                    clearInterval(interval);
                } else {
                    if (currentTop === "auto") {
                        currentTop = "0px";
                    } else {
                        currentTop = parseInt(currentTop) + 15 + "px";
                    }

                    box.style.top = currentTop;
                }
                count++;
            }, 500);
        });
    </script>

</body>
</html>
